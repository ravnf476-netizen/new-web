<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will You Be My Girlfriend Again?</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    h1 {
        color: white;
        margin-bottom: 30px;
        text-align: center;
    }

    .btn-container {
        position: relative;
        width: 300px;
        height: 150px;
    }

    button {
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        position: absolute;
        transition: 0.2s;
    }

    #yes {
        background: #4CAF50;
        color: white;
        left: 30px;
        top: 50px;
    }

    #no {
        background: #f44336;
        color: white;
        left: 150px;
        top: 50px;
    }

    .message {
        margin-top: 20px;
        font-size: 24px;
        color: white;
        display: none;
    }
</style>
</head>
<body>

<h1>Will you be my girlfriend AGAIN?? 💖</h1>

<div class="btn-container">
    <button id="yes">Yes 💕</button>
    <button id="no">No 😢</button>
</div>

<div class="message" id="msg">I knew it 😍💖</div>

<!-- YouTube Music Embed -->
<iframe width="0" height="0" 
src="https://www.youtube.com/embed/ys6TCO_olOc?autoplay=1&loop=1&playlist=ys6TCO_olOc"
frameborder="0" allow="autoplay"></iframe>

<script>
const noBtn = document.getElementById("no");
const container = document.querySelector(".btn-container");

noBtn.addEventListener("mouseover", () => {
    const maxX = container.clientWidth - noBtn.offsetWidth;
    const maxY = container.clientHeight - noBtn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

document.getElementById("yes").onclick = () => {
    document.getElementById("msg").style.display = "block";
};
</script>

</body>
</html>
